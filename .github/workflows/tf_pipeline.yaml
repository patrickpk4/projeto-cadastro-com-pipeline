name: Terraform CI/CD

on:
  pull_request:
    branches: [main]
    paths: ["src/terraform/**.tf"]
    # PR na main → só testes, sem apply

  push:
    branches:
      - staging
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
    paths: ["src/terraform/**.tf"]
    # push staging sem tag → só testes
    # tag v* → apply staging, depois prod aguarda aprovação

jobs:
  # ─────────────────────────────────────────────────────────────────
  # ETAPA 1 — Definir ambiente
  # ─────────────────────────────────────────────────────────────────
  set-environment:
    name: Definir Ambiente
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.set-env.outputs.ENV }}
      is_deploy: ${{ steps.set-env.outputs.IS_DEPLOY }}

    steps:
      - name: Resolver ambiente pelo trigger
        id: set-env
        run: |
          REF="${{ github.ref }}"
          EVENT="${{ github.event_name }}"

          if [[ "$REF" == refs/tags/* ]]; then
            # tag → começa pelo staging, prod vem depois em job separado
            echo "ENV=staging"    >> $GITHUB_OUTPUT
            echo "IS_DEPLOY=true" >> $GITHUB_OUTPUT

          elif [[ "$REF" == refs/heads/staging ]]; then
            echo "ENV=staging"     >> $GITHUB_OUTPUT
            echo "IS_DEPLOY=false" >> $GITHUB_OUTPUT
            # push sem tag → só testes, sem apply

          elif [[ "$EVENT" == "pull_request" ]]; then
            echo "ENV=staging"     >> $GITHUB_OUTPUT
            echo "IS_DEPLOY=false" >> $GITHUB_OUTPUT
            # PR na main → valida contra configuração de staging

          else
            echo " Trigger não mapeado"
            exit 1
          fi
  # ─────────────────────────────────────────────────────────────────
  # ETAPA 2 — Testes estáticos
  # Roda sempre: PR, push staging, tag
  # ─────────────────────────────────────────────────────────────────
  validate:
    name: Testes Estáticos
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload SARIF para aba Security
      pull-requests: write # comentar no PR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ vars.TF_VERSION }}

      # ── 1. Formatação ──────────────────────────────────────────
      - name: Terraform Format
        working-directory: ${{ vars.TF_DIR }}
        run: terraform fmt -check -recursive
        # bloqueia se algum .tf não estiver formatado

      # ── 2. Validação de sintaxe ────────────────────────────────
      - name: Terraform Init (sem backend)
        working-directory: ${{ vars.TF_DIR }}
        run: terraform init -backend=false
        # .terraform.lock.hcl commitado garante versão exata do provider
        # sem necessidade de cache

      - name: Terraform Validate
        working-directory: ${{ vars.TF_DIR }}
        run: terraform validate
        # valida referências internas, tipos e argumentos

      # ── 3. Lint de boas práticas ───────────────────────────────
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: TFLint
        working-directory: ${{ vars.TF_DIR }}
        run: |
          tflint --init
          tflint --recursive
        # detecta: tipo de instância inválido, variáveis não usadas,
        # argumentos deprecados, regras do provider AWS

      # ── 4. Scan de segurança — tfsec ──────────────────────────
      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: ${{ vars.TF_DIR }}
          soft_fail: false
          github_token: ${{ secrets.GITHUB_TOKEN }}
        # comenta no PR quando encontra falhas
        # detecta: portas abertas, S3 público, criptografia ausente

      # ── 5. Scan de segurança — Checkov ────────────────────────
      - name: Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: ${{ vars.TF_DIR }}
          framework: terraform
          soft_fail: false
          output_format: sarif
          output_file_path: checkov.sarif
        # complementa o tfsec com checagens diferentes

      - name: Upload Checkov para GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov.sarif
        # resultado aparece em Security → Code Scanning do repositório

      # ── 6. Estimativa de custo — Infracost ────────────────────
      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}
        # chave gratuita em infracost.io

      - name: Infracost breakdown
        working-directory: ${{ vars.TF_DIR }}
        run: |
          infracost breakdown \
            --path=. \
            --format=json \
            --out-file=/tmp/infracost.json

      - name: Infracost comentar no PR
        if: github.event_name == 'pull_request'
        run: |
          infracost comment github \
            --path=/tmp/infracost.json \
            --repo=$GITHUB_REPOSITORY \
            --github-token=${{ secrets.GITHUB_TOKEN }} \
            --pull-request=${{ github.event.pull_request.number }} \
            --behavior=update
        # atualiza o mesmo comentário a cada push no PR
        # mostra diff de custo: quanto vai aumentar/diminuir

  # ─────────────────────────────────────────────────────────────────
  # ETAPA 3 — Plan Staging
  # Roda em: PR na main, push staging, tag v*
  # ─────────────────────────────────────────────────────────────────
  plan-staging:
    name: Terraform Plan (staging)
    runs-on: ubuntu-latest
    needs: validate
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && (
        github.ref == 'refs/heads/staging' ||
        startsWith(github.ref, 'refs/tags/v')
      ))
    permissions:
      id-token: write
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ vars.TF_VERSION }}

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.REGION }}
          role-to-assume: ${{ vars.AWS_ROLE }}

      - name: Terraform Init
        working-directory: ${{ vars.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.BACKEND }}" \
            -backend-config="key=${{ vars.KEY }}" \
            -backend-config="region=${{ vars.REGION }}"

      - name: Terraform Plan
        id: plan
        working-directory: ${{ vars.TF_DIR }}
        env:
          TFVARS: ${{ secrets.TFVARS }}
        run: |
          echo "$TFVARS" > terraform.tfvars
          terraform plan \
            -var-file="terraform.tfvars" \
            -out=tfplan \
            -no-color \
            -input=false

      - name: Salvar tfplan staging
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-staging
          path: ${{ vars.TF_DIR }}/tfplan
          retention-days: 1

      - name: Comentar plan no PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.plan.outputs.stdout }}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              body: `### Terraform Plan — \`staging\`\n\`\`\`hcl\n${output}\n\`\`\``
            });

  # ─────────────────────────────────────────────────────────────────
  # ETAPA 4 — Plan Production
  # Roda somente no merge staging → main
  # ─────────────────────────────────────────────────────────────────
  plan-production:
    name: Terraform Plan (production)
    runs-on: ubuntu-latest
    needs: validate
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ vars.TF_VERSION }}

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.REGION }}
          role-to-assume: ${{ vars.AWS_ROLE }}

      - name: Terraform Init
        working-directory: ${{ vars.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.BACKEND_PROD }}" \
            -backend-config="key=${{ vars.KEY_PROD }}" \
            -backend-config="region=${{ vars.REGION }}"

      - name: Terraform Plan
        id: plan
        working-directory: ${{ vars.TF_DIR }}
        env:
          TFVARS: ${{ secrets.TFVARS_PROD }}
        run: |
          echo "$TFVARS" > terraform.tfvars
          terraform plan \
            -var-file="terraform.tfvars" \
            -out=tfplan \
            -no-color \
            -input=false

      - name: Salvar tfplan production
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-production
          path: ${{ vars.TF_DIR }}/tfplan
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────
  # ETAPA 5 — Apply Staging
  # Roda somente com tag v*
  # ─────────────────────────────────────────────────────────────────
  apply-staging:
    name: Terraform Apply (staging)
    runs-on: ubuntu-latest
    needs: plan-staging
    if: |
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v')
    environment: staging
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ vars.TF_VERSION }}

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.REGION }}
          role-to-assume: ${{ vars.AWS_ROLE }}

      - name: Terraform Init
        working-directory: ${{ vars.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.BACKEND }}" \
            -backend-config="key=${{ vars.KEY }}" \
            -backend-config="region=${{ vars.REGION }}"

      - name: Baixar tfplan staging
        uses: actions/download-artifact@v4
        with:
          name: tfplan-staging
          path: ${{ vars.TF_DIR }}

      - name: Terraform Apply
        working-directory: ${{ vars.TF_DIR }}
        run: terraform apply -auto-approve -input=false tfplan

      - name: Resumo
        run: |
          echo "###  Staging aplicado com sucesso"                          >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** ${{ github.ref_name }}"                            >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}"                              >> $GITHUB_STEP_SUMMARY
          echo ""                                                             >> $GITHUB_STEP_SUMMARY
          echo "Abra o PR \`staging → main\` para promover para produção."   >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────
  # ETAPA 6 — Apply Production
  # Roda somente após merge staging → main
  # Protegido por aprovação manual no GitHub varsironment
  # ─────────────────────────────────────────────────────────────────
  apply-production:
    name: Terraform Apply (production)
    runs-on: ubuntu-latest
    needs: plan-production
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    environment: production
    # Settings → environments → production → Required reviewers
    # pipeline pausa aqui até aprovação manual
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ vars.TF_VERSION }}

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.REGION }}
          role-to-assume: ${{ vars.AWS_ROLE }}

      - name: Terraform Init
        working-directory: ${{ vars.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.BACKEND_PROD }}" \
            -backend-config="key=${{ vars.KEY_PROD }}" \
            -backend-config="region=${{ vars.REGION }}"

      - name: Baixar tfplan production
        uses: actions/download-artifact@v4
        with:
          name: tfplan-production
          path: ${{ vars.TF_DIR }}

      - name: Terraform Apply
        working-directory: ${{ vars.TF_DIR }}
        run: terraform apply -auto-approve -input=false tfplan

      - name: Resumo
        run: |
          echo "###  Production aplicado com sucesso" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}"        >> $GITHUB_STEP_SUMMARY
