name: Terraform Apply (production)

on:
  workflow_call:
    secrets:
      TFVARS_PROD:
        description: "Arquivo tfvars para produção"
        required: true
      BUCKET_PROD:
        description: "Bucket S3 para backend Terraform produção"
        required: true
      KEY_PROD:
        description: "Chave no bucket S3 para backend Terraform produção"
        required: true
      AWS_ROLE:
        description: "ARN do Role AWS para assumir durante o apply"
        required: true
# ─────────────────────────────────────────────────────────────────
# Apply Production
# Roda somente após merge staging → main
# Protegido por aprovação manual via GitHub Environment
# Settings → Environments → production → Required reviewers
# ─────────────────────────────────────────────────────────────────

jobs:
  apply:
    name: Apply
    runs-on: ubuntu-latest
    environment: production
    # ↑ pipeline pausa aqui até aprovação manual do reviewer
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ vars.TF_VERSION }}

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE }}

      - name: Terraform Init
        working-directory: ${{ vars.TF_DIR_PROD }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.BUCKET_PROD }}" \
            -backend-config="key=${{ secrets.KEY_PROD }}" \
            -backend-config="region=${{ vars.REGION }}"

      - name: Baixar tfplan production
        uses: actions/download-artifact@v4
        with:
          name: tfplan-production
          path: ${{ vars.TF_DIR_PROD }}

      - name: Terraform Apply
        working-directory: ${{ vars.TF_DIR_PROD }}
        run: terraform apply -auto-approve -input=false tfplan

      - name: Resumo
        run: |
          echo "###  Production aplicado com sucesso" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}"        >> $GITHUB_STEP_SUMMARY
