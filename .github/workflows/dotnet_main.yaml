name: dotnet-build

on:
  pull_request:
    branches: [main]
    paths: ["**/src/production/*.*"]

  push:
    branches:
      - staging
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
    paths-ignore:
      - "infra/**/*.md"
      - "src/**/*.md"
      #- "**/*.yaml"

permissions:
  contents: read
  pull-requests: write
  security-events: write
  id-token: write

jobs:
  # ────────────────────────────────────────────────────────────────
  # ETAPA 2 — Build e Testes
  # Roda sempre: PR, push staging, push main, tag
  # ────────────────────────────────────────────────────────────────
  build:
    name: Build e Testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}
      - name:
          Setup .NET build dependencies
          # You may pin to the exact commit or the version.
          # uses: timheuer/bootstrap-dotnet@24cc1daf4eac0fa670c7f5773108f26d90f54baa
        uses: timheuer/bootstrap-dotnet@v3
        with:
          # What .NET SDK version to use
          dotnet-version: "8.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v3
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        working-directory: src/PedeLogo.Catalogo.Api
        run: dotnet restore

      - name: Build
        working-directory: src/PedeLogo.Catalogo.Api
        run: dotnet build --configuration Release --no-restore

      - name: sonarscanner
        uses: sonarsource/sonarcloud-github-action@master
        with:
          args: >
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}
            -Dsonar.projectKey=${{secrets.SONAR_PROJECT_KEY}}
            -Dsonar.organization=${{secrets.SONAR_ORGANIZATION}}
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.coverage.exclusions=**/Tests/**
            -Dsonar.cs.opencover.reportsPaths=**/coverage.opencover.xml
            -Dsonar.verbose=true
            -Dsonar.cs.vstest.reportsPaths=**/TestResults/*.trx
            -Dsonar.cs.vstest.reportsPaths=**/TestResults/*.xml
