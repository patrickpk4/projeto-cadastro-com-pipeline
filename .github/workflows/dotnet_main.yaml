name: dotnet-build

on:
  pull_request:
    branches: [main]
    paths: ["**/src/production/*.*"]

  push:
    branches:
      - staging
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
    paths-ignore:
      - "infra/**/*.md"
      - "src/**/*.md"
      #- "**/*.yaml"

permissions:
  contents: read
  pull-requests: write
  security-events: write
  id-token: write

jobs:
  # ────────────────────────────────────────────────────────────────
  # ETAPA 2 — Build e Testes
  # Roda sempre: PR, push staging, push main, tag
  # ────────────────────────────────────────────────────────────────
  build:
    name: Build e Testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      - name: Setup java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup .NET build
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        working-directory: src/PedeLogo.Catalogo.Api
        run: dotnet restore

      - name: Build
        working-directory: src/PedeLogo.Catalogo.Api
        run: dotnet build --configuration Release --no-restore

      - name: Testes Unitários
        run: |
          dotnet test tests/PedeLogo.Catalogo.UnitTests \
            --configuration Release \
            --no-build \
            --logger "trx;LogFileName=unit-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      - name: sonarcloud
        uses: sonarsource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          sonar.host.url: https://sonarcloud.io
        with:
          args: >
            -Dsonar.projectKey=${{secrets.SONAR_PROJECT_KEY}}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.cs.opencover.reportsPaths=**/TestResults/**/coverage.opencover.xml
            -Dsonar.cs.vstest.reportsPaths=**/TestResults/*.trx
            -Dsonar.coverage.exclusions=**/Migrations/**
