name: Terraform CI/CD

on:
  pull_request:
    branches: [main]
    paths: ["**/infra/production**.tf"]

  push:
    branches:
      - staging
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
    paths-ignore:
      - "infra/**/*.md"
      - "src/**"
      - "**/*.yaml"

permissions:
  contents: read
  pull-requests: write
  security-events: write
  id-token: write

# ─────────────────────────────────────────────────────────────────
# ORQUESTRADOR — apenas define ambiente e encadeia os módulos
# Toda lógica de execução fica nos reusable workflows
# ─────────────────────────────────────────────────────────────────

jobs:
  # ── 1. Centraliza decisão de ambiente ─────────────────────────
  set-environment:
    name: Definir Ambiente
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.set-env.outputs.ENV }}
      is_deploy: ${{ steps.set-env.outputs.IS_DEPLOY }}

    steps:
      - name: Resolver ambiente pelo trigger
        id: set-env
        run: |
          REF="${{ github.ref }}"
          EVENT="${{ github.event_name }}"

          if [[ "$REF" == refs/tags/v* ]]; then
            echo "ENV=staging"    >> $GITHUB_OUTPUT
            echo "IS_DEPLOY=true" >> $GITHUB_OUTPUT

          elif [[ "$REF" == refs/heads/staging ]]; then
            echo "ENV=staging"     >> $GITHUB_OUTPUT
            echo "IS_DEPLOY=false" >> $GITHUB_OUTPUT
            
          elif [[ "$REF" == refs/heads/main ]]; then
            echo "ENV=production"  >> $GITHUB_OUTPUT
            echo "IS_DEPLOY=true"  >> $GITHUB_OUTPUT
            
          elif [[ "$EVENT" == "pull_request" ]]; then
            echo "ENV=staging"     >> $GITHUB_OUTPUT
            echo "IS_DEPLOY=false" >> $GITHUB_OUTPUT
            


          else
            echo "Trigger não mapeado: REF=$REF EVENT=$EVENT"
            exit 1
          fi

  # ── 2. Testes estáticos — roda sempre ─────────────────────────
  validate:
    name: Testes Estáticos
    needs: set-environment
    uses: ./.github/workflows/tf_validate.yaml
    secrets: inherit
    with:
      environment: ${{ needs.set-environment.outputs.env_name }}
      is_pull_request: ${{ github.event_name == 'pull_request' }}

  # ── 3a. Plan Staging ──────────────────────────────────────────
  plan-staging:
    name: Plan Staging
    needs: [set-environment, validate]
    if: |
      needs.set-environment.outputs.env_name == 'staging'
    uses: ./.github/workflows/tf_plan_stag.yaml
    secrets: inherit
  # ── 3b. Plan Production ───────────────────────────────────────
  plan-production:
    name: Plan Production
    needs: [set-environment, validate]
    if: |
      needs.set-environment.outputs.env_name == 'production'
    uses: ./.github/workflows/tf_plan_prod.yaml
    secrets: inherit

  # ── 4a. Apply Staging (somente tag v*) ────────────────────────
  apply-staging:
    name: Apply Staging
    needs: [set-environment, plan-staging]
    if: |
      needs.set-environment.outputs.is_deploy == 'true' &&
      needs.set-environment.outputs.env_name == 'staging'
    uses: ./.github/workflows/tf_apply_stag.yaml
    secrets: inherit

  # ── 4b. Apply Production (aguarda aprovação manual) ───────────
  apply-production:
    name: Apply Production
    needs: [set-environment, plan-production]
    if: |
      needs.set-environment.outputs.is_deploy == 'true' &&
      needs.set-environment.outputs.env_name == 'production'
    uses: ./.github/workflows/tf_apply_prod.yaml
    secrets: inherit
