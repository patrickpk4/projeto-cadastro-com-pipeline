name: Terraform CI/CD

on:
  pull_request:
    branches: [main]
    paths: ["src/terraform/**.tf"]
    # PR na main → só testes, sem apply

  push:
    branches:
      - staging
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
    paths: ["src/terraform/**.tf"]
    # push staging sem tag → só testes
    # tag v* → apply staging, depois prod aguarda aprovação

env:
  TF_VERSION: "1.7.0"
  TF_DIR: "./src/terraform"

jobs:
  # ─────────────────────────────────────────────────────────────────
  # ETAPA 1 — Definir ambiente (staging ou production) a partir do trigger
  # ─────────────────────────────────────────────────────────────────
  set-environment:
    name: Definir Ambiente
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.set-env.outputs.ENV }}
      is_deploy: ${{ steps.set-env.outputs.IS_DEPLOY }}

    steps:
      - name: Resolver ambiente pelo trigger
        id: set-env
        run: |
          REF="${{ github.ref }}"
          EVENT="${{ github.event_name }}"

          if [[ "$REF" == refs/tags/* ]]; then
            # tag → começa pelo staging, prod vem depois em job separado
            echo "ENV=staging"    >> $GITHUB_OUTPUT
            echo "IS_DEPLOY=true" >> $GITHUB_OUTPUT

          elif [[ "$REF" == refs/heads/staging ]]; then
            echo "ENV=staging"     >> $GITHUB_OUTPUT
            echo "IS_DEPLOY=false" >> $GITHUB_OUTPUT
            # push sem tag → só testes, sem apply

          elif [[ "$EVENT" == "pull_request" ]]; then
            echo "ENV=staging"     >> $GITHUB_OUTPUT
            echo "IS_DEPLOY=false" >> $GITHUB_OUTPUT
            # PR na main → valida contra configuração de staging

          else
            echo "❌ Trigger não mapeado"
            exit 1
          fi

  # ─────────────────────────────────────────────────────────────────
  # ETAPA 2 — Testes estáticos (roda sempre: PR, push e tag)
  # ─────────────────────────────────────────────────────────────────
  validate:
    name: Testes Estáticos
    runs-on: ubuntu-latest
    needs: set-environment
    permissions:
      contents: read
      security-events: write # necessário para upload de SARIF (CodeQL/tfsec)
      pull-requests: write # necessário para comentar no PR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # ── 1. Formatação ──────────────────────────────────────────
      - name: Terraform Format
        working-directory: ${{ env.TF_DIR }}
        run: terraform fmt -check -recursive
        # bloqueia se algum .tf não estiver formatado corretamente

      # ── 2. Validação de sintaxe ────────────────────────────────
      - name: Terraform Init (sem backend)
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -backend=false
        # só baixa providers — não conecta ao S3

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate
        # valida referências internas, tipos e argumentos

      # ── 3. Lint de boas práticas ───────────────────────────────
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: TFLint
        working-directory: ${{ env.TF_DIR }}
        run: |
          tflint --init
          tflint --recursive
        # detecta: tipo de instância inválido, variável não usada,
        # argumentos deprecados, regras do provider AWS

      # ── 4. Scan de segurança — tfsec ───────────────────────────
      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: ${{ env.TF_DIR }}
          soft_fail: false
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # comenta diretamente no PR quando encontra falhas
          # detecta: portas abertas, S3 público, criptografia ausente

      # ── 5. Scan de segurança — Checkov ─────────────────────────
      - name: Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: src/terraform
          framework: terraform
          soft_fail: false
          output_format: sarif
          output_file_path: checkov.sarif
          # complementa o tfsec com checagens diferentes

      - name: Upload resultado Checkov para GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov.sarif
          # aparece na aba Security → Code Scanning do repositório

      # ── 6. Estimativa de custo — Infracost ─────────────────────
      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}
        # chave gratuita em infracost.io

      - name: Infracost — estimativa de custo
        working-directory: ${{ env.TF_DIR }}
        run: |
          infracost breakdown \
            --path=. \
            --format=json \
            --out-file=/tmp/infracost.json

      - name: Infracost — comentar no PR
        if: github.event_name == 'pull_request'
        run: |
          infracost comment github \
            --path=/tmp/infracost.json \
            --repo=$GITHUB_REPOSITORY \
            --github-token=${{ secrets.GITHUB_TOKEN }} \
            --pull-request=${{ github.event.pull_request.number }} \
            --behavior=update
            # atualiza o mesmo comentário a cada push no PR
            # mostra diff de custo: quanto vai aumentar/diminuir

  # ─────────────────────────────────────────────────────────────────
  # ETAPA 3 — Plan
  # Roda em: push staging, tag, PR
  # ─────────────────────────────────────────────────────────────────
  plan:
    name: Terraform Plan (${{ needs.set-environment.outputs.env_name }})
    runs-on: ubuntu-latest
    needs: [set-environment, validate]
    permissions:
      id-token: write
      contents: read
      pull-requests: write

    env:
      ENV: ${{ needs.set-environment.outputs.env_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.REGION }}
          role-to-assume: ${{ vars.AWS_ROLE }}
          # role única para os dois ambientes

      - name: Terraform Init — Staging
        if: env.ENV == 'staging'
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.BACKEND }}" \
            -backend-config="key=${{ vars.KEY }}" \
            -backend-config="region=${{ vars.REGION }}"

      - name: Terraform Init — Production
        if: env.ENV == 'production'
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.BACKEND_PROD }}" \
            -backend-config="key=${{ vars.KEY_PROD }}" \
            -backend-config="region=${{ vars.REGION }}"

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_DIR }}
        env:
          TFVARS: ${{ env.ENV == 'production' && secrets.TFVARS_PROD || secrets.TFVARS }}
        run: |
          echo "$TFVARS" > terraform.tfvars
          terraform plan \
            -var-file="terraform.tfvars" \
            -out=tfplan \
            -no-color \
            -input=false

      - name: Salvar tfplan como artefato
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ env.ENV }}
          path: ${{ env.TF_DIR }}/tfplan
          retention-days: 1

      - name: Comentar plan no PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.plan.outputs.stdout }}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              body: `### Terraform Plan — \`${{ env.ENV }}\`\n\`\`\`hcl\n${output}\n\`\`\``
            });

  # ─────────────────────────────────────────────────────────────────
  # ETAPA 4 — Apply Staging
  # Roda somente com tag v* — push sem tag não aplica
  # ─────────────────────────────────────────────────────────────────
  apply-staging:
    name: Terraform Apply (staging)
    runs-on: ubuntu-latest
    needs: [set-environment, plan]
    if: |
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v')
    environment: staging
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.REGION }}
          role-to-assume: ${{ vars.AWS_ROLE }}

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.BACKEND }}" \
            -backend-config="key=${{ vars.KEY }}" \
            -backend-config="region=${{ vars.REGION }}"

      - name: Baixar tfplan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-staging
          path: ${{ env.TF_DIR }}

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve -input=false tfplan

      - name: Resumo
        run: |
          echo "### ✅ Staging aplicado com sucesso" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** ${{ github.ref_name }}"   >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}"     >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Abra o PR de \`staging → main\` para promover para produção." >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────
  # ETAPA 5 — Apply Production
  # Roda somente após merge do PR staging → main
  # Protegido por aprovação manual no GitHub Environment
  # ─────────────────────────────────────────────────────────────────
  apply-production:
    name: Terraform Apply (production)
    runs-on: ubuntu-latest
    needs: [set-environment, plan]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    environment: production
    # ↑ Settings → Environments → production → Required reviewers
    # pipeline pausa aqui até aprovação manual
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.REGION }}
          role-to-assume: ${{ vars.AWS_ROLE }}

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.BACKEND_PROD }}" \
            -backend-config="key=${{ vars.KEY_PROD }}" \
            -backend-config="region=${{ vars.REGION }}"

      - name: Baixar tfplan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-production
          path: ${{ env.TF_DIR }}

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve -input=false tfplan

      - name: Resumo
        run: |
          echo "### ✅ Production aplicado com sucesso" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}"        >> $GITHUB_STEP_SUMMARY
